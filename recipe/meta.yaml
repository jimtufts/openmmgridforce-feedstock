{% set name = "openmmgridforce" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jimtufts/openmmgridforce/archive/refs/tags/{{ version }}.tar.gz
  sha256: c7f99a621132f0c4a8b92d02487e6343aaa1b57c5d81c18c5996b30e919bedac

build:
  number: 0
  skip: True  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - swig
    - make  # [unix]
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - numpy
    - openmm >=8.0
    - setuptools
    - netCDF4
    - pytest
  run:
    - python
    - numpy
    - {{ pin_compatible('openmm', max_pin='x.x') }}

test:
  source_files:
    - python/tests
    - python/prmtopcrd
    - python/grids
  imports:
    - gridforceplugin
  requires:
    - pip
    - pytest
    - netCDF4
    - openmm
  commands:
    - pip check
    - cd python/tests && pytest test_grid_force.py test_auto_grid.py test_auto_scaling.py -v

about:
  home: https://github.com/jimtufts/openmmgridforce
  summary: 'OpenMM plugin for grid-based forces'
  description: |
    GridForce plugin for OpenMM that enables grid-based force calculations.
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jimtufts
