{% set name = "openmmgridforce" %}
{% set version = "0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jimtufts/openmmgridforce/archive/refs/tags/{{ version }}.tar.gz
  sha256: d040d1c9b45fdb0869664c0417a449883ba672e4a7850e80a701b47a48e14cef

build:
  number: 0
  skip: True  # [win or osx]

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - swig =3.0.12
    - make  # [unix]
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - numpy
    - openmm >=8.0
    - setuptools
    - netCDF4
    - pytest
  run:
    - python
    - numpy
    - {{ pin_compatible('openmm', max_pin='x.x') }}

test:
  source_files:
    - python/tests
    - python/prmtopcrd
    - python/grids
  imports:
    - gridforceplugin
  requires:
    - pip
    - pytest
    - netCDF4
  commands:
    - pip check
    - cd python/tests && pytest test_grid_force.py -v

about:
  home: https://github.com/jimtufts/openmmgridforce
  summary: 'OpenMM plugin for grid-based forces'
  description: |
    GridForce plugin for OpenMM that enables grid-based force calculations.
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jimtufts
